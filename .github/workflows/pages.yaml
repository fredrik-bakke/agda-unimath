name: Build and deploy library website
on:
  # To run this workflow manually
  workflow_dispatch:
    inputs:
      ref:
        description: the repository ref to build
        required: true
        default: master

  workflow_run:
    workflows:
      - Clean build and profiling of library
    types:
      - completed

# Cancel previous runs of the same branch
concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.run_id }}'
  cancel-in-progress: true

jobs:
  website:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agda: ['2.8.0']
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      contents: read
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    steps:
      - name: Checkout our repository
        uses: actions/checkout@v4
        with:
          path: repo
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.inputs.ref }}
          # We need the entire history for contributor information
          fetch-depth: 0

      - name: Setup Agda ${{ matrix.agda }} (prebuilt)
        uses: ./repo/.github/actions/setup-agda
        with:
          agda-version: ${{ matrix.agda }}

      - uses: actions/cache/restore@v4
        id: cache-agda-formalization
        name: Restore Agda formalization cache
        with:
          path: repo/_build
          key:
            ${{ runner.os }}-check-${{ github.ref }}-${{ matrix.agda }}-${{
            hashFiles('repo/src/**') }}
          restore-keys: |
            ${{ runner.os }}-check-${{ github.ref }}-${{ matrix.agda }}-

      # Keep versions in sync with the Makefile
      - name: MDBook setup
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.4.34'

      - name: Install mdbook-pagetoc
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook-pagetoc
          version: '0.1.7'

      - name: Install mdbook-katex
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook-katex
          version: '0.5.7'

      - name: Install mdbook-linkcheck
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook-linkcheck
          version: '0.7.7'

      - name: Install mdbook-catppuccin
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook-catppuccin
          version: '1.2.0'

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          check-latest: true
          cache: 'pip'

      - run: python3 -m pip install -r repo/scripts/requirements.txt

      - name: Prepare benchmark data
        run: |
          mkdir -p repo/website/benchmarks
          cd repo
          git fetch origin benchmark-data || true
          if git show-ref --verify --quiet refs/remotes/origin/benchmark-data; then
            git show origin/benchmark-data:data.json > website/benchmarks/data.json
          fi
          test -f website/benchmarks/data.json
          printf 'window.BENCHMARK_DATA = ' > website/benchmarks/data.js
          cat website/benchmarks/data.json >> website/benchmarks/data.js

      - name: Generate book
        env:
          MDBOOK_PREPROCESSOR__GIT_METADATA__ENABLE: 'true'
        run: |
          cd repo
          make website

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo/book/html

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
